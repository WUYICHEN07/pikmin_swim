{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-md-6">
        <div class="glass-card">
            <h2 class="mb-4 text-center">新增運動紀錄</h2>
            <form action="{{ url_for('record.create_record') }}" method="POST">
                
                <div class="mb-4">
                    <label class="form-label">選擇水上運動類型</label>
                    <select name="sport_type" class="form-select bg-transparent text-white" style="border: 1px solid rgba(255,255,255,0.3);" required>
                        <option value="" class="text-dark">-- 請選擇 --</option>
                        <option value="freestyle" class="text-dark">自由式 Freestyle (步數加成 1.2x)</option>
                        <option value="breaststroke" class="text-dark">蛙式 Breaststroke</option>
                        <option value="butterfly" class="text-dark">蝶式 Butterfly (步數加成 1.5x)</option>
                        <option value="backstroke" class="text-dark">仰式 Backstroke</option>
                    </select>
                </div>

                <div class="mb-4">
                    <label class="form-label">游泳距離 (公尺)</label>
                    <div class="input-group">
                        <input type="number" step="0.1" name="distance_m" class="form-control" required placeholder="例如: 1000">
                        <span class="input-group-text bg-transparent text-white border-light">m</span>
                    </div>
                </div>

                <div class="mb-5">
                    <label class="form-label">運動時長 (分鐘)</label>
                    <div class="input-group">
                        <input type="number" step="0.1" name="duration_min" class="form-control" required placeholder="例如: 30">
                        <span class="input-group-text bg-transparent text-white border-light">min</span>
                    </div>
                </div>

                <button type="submit" class="btn btn-glass w-100 py-3 fs-5 rounded-pill">送出並換算步數</button>
                <div class="text-center mt-3">
                    <a href="{{ url_for('dashboard.dashboard') }}" class="text-white text-decoration-none small">返回主控台</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
